<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSeek - Máy Tìm Kiếm Chuyên Sâu IT & Lập Trình (Vertical Search Engine)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .home-body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .home-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-top: -10vh;
        }
        .brand-section { margin-bottom: 2.5rem; }
        .logo-title { font-size: 4.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; }
        .logo-title .gradient-text {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-subtitle { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 1.5rem; font-weight: 400; }
        
        .search-form { width: 100%; max-width: 680px; margin: 0 auto 2rem auto; }
        .search-input-wrapper {
            position: relative;
            background: rgba(26, 34, 56, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .search-input-wrapper:hover, .search-input-wrapper:focus-within {
            background: rgba(26, 34, 56, 0.6);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.15);
        }
        .search-icon {
            padding: 0 1rem 0 1.2rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-family: var(--font-sans);
            padding: 0.8rem 0;
            outline: none;
        }
        .search-input::placeholder { color: var(--text-muted); font-weight: 300; }
        .search-submit-btn {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 0.8rem 1.8rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .search-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .quick-suggestions { margin-top: 1.5rem; }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .query-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .query-tag:hover {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.3);
        }

        .home-footer {
            position: fixed;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .footer-stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            opacity: 0.8;
        }
        .footer-link {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-link:hover { color: #38bdf8; }
    </style>
</head>
<body class="home-body">
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="home-container">
        <!-- Header & Branding -->
        <div class="brand-section">
            <h1 class="logo-title">Dev<span class="gradient-text">Seek</span></h1>
            <p class="brand-subtitle">Máy Tìm Kiếm Kỹ Thuật Số & Lập Trình</p>
        </div>

        <!-- Search Box Section -->
        <div class="search-section">
            <form action="{{ url_for('search') }}" method="GET" class="search-form">
                <input type="hidden" name="algorithm" value="hybrid">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" name="q" id="searchInput" class="search-input" 
                           placeholder="Tìm kiếm tài liệu, giải pháp lập trình..." 
                           autocomplete="off" autofocus required>
                    <button type="submit" class="search-submit-btn">
                        <span>Search</span>
                    </button>
                </div>
            </form>

            <!-- Quick Suggestions -->
            <div class="quick-suggestions">
                <div class="tags-container">
                    <a href="{{ url_for('search', q='python cơ bản') }}" class="query-tag">Python Cơ bản</a>
                    <a href="{{ url_for('search', q='react hooks') }}" class="query-tag">React Hooks</a>
                    <a href="{{ url_for('search', q='restful api') }}" class="query-tag">RESTful API</a>
                    <a href="{{ url_for('search', q='docker compose') }}" class="query-tag">Docker Compose</a>
                    <a href="{{ url_for('search', q='thuật toán quicksort') }}" class="query-tag">Thuật toán QuickSort</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="home-footer">
        <div class="footer-stats">
            <span><i class="fa-solid fa-database"></i> <strong>{{ doc_count | default('1000+') }}</strong> bài viết</span>
            <span><i class="fa-solid fa-bolt"></i> <strong>TF-IDF & BM25F</strong></span>
            <a href="{{ url_for('annotate_page') }}" class="footer-link"><i class="fa-solid fa-user-check"></i> Expert Ground Truth</a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
