<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Điểm Ground Truth (Human Annotation) - DevSeek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .annotate-container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        .query-select-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .query-select { width: 100%; padding: 0.8rem; border-radius: 8px; background: #0f172a; color: #f8fafc; border: 1px solid #334155; font-size: 1rem; margin-top: 0.5rem; }
        .doc-item { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; transition: all 0.2s; }
        .doc-item.selected { border-color: #34d399; background: rgba(16, 185, 129, 0.08); }
        .toggle-btn { background: #334155; color: #f8fafc; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
        .doc-item.selected .toggle-btn { background: #10b981; color: #fff; }
        .save-bar { position: sticky; bottom: 1rem; background: #1e293b; border: 1px solid #38bdf8; padding: 1rem 1.5rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; }
        .save-btn { background: linear-gradient(135deg, #0284c7, #38bdf8); color: white; border: none; padding: 0.8rem 1.8rem; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body class="home-body">
    <header class="results-header" style="padding: 1rem 2rem; background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
        <a href="{{ url_for('index') }}" class="logo-wrapper" style="text-decoration: none;">
            <div class="logo-icon"><i class="fa-solid fa-code"></i></div>
            <h2 class="logo-title" style="margin: 0; font-size: 1.5rem;">Dev<span class="gradient-text">Seek</span></h2>
        </a>
        <div style="color: #38bdf8; font-weight: 600;"><i class="fa-solid fa-user-check"></i> Chế độ gán nhãn Ground Truth (Human Relevance Feedback)</div>
    </header>

    <main class="annotate-container">
        <div class="query-select-card">
            <label for="queryDropdown" style="font-weight: 600; color: #e2e8f0;"><i class="fa-solid fa-list-check"></i> Chọn câu truy vấn Benchmark để đánh giá:</label>
            <select id="queryDropdown" class="query-select" onchange="loadQueryResults()">
                <option value="">-- Chọn truy vấn (q01 đến q20) --</option>
                {% for q in queries %}
                <option value="{{ q.query_id }}" data-text="{{ q.query }}">[{{ q.query_id }}] {{ q.query }}</option>
                {% endfor %}
            </select>
        </div>

        <div id="loadingIndicator" style="display: none; text-align: center; padding: 2rem; color: #38bdf8;">
            <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
            <p>Đang tải kết quả tìm kiếm cho truy vấn...</p>
        </div>

        <div id="resultsList"></div>

        <div id="saveBar" class="save-bar" style="display: none;">
            <div>
                <span style="color: #e2e8f0; font-weight: 600;" id="selectedCountText">Đã chọn 0 tài liệu phù hợp (Relevant)</span>
            </div>
            <button class="save-btn" onclick="saveAnnotations()"><i class="fa-solid fa-floppy-disk"></i> Lưu Ground Truth Chuẩn</button>
        </div>
    </main>

    <script>
        let currentQueryId = "";
        let currentQueryText = "";
        let approvedDocIds = new Set();

        async function loadQueryResults() {
            const dropdown = document.getElementById("queryDropdown");
            const selectedOption = dropdown.options[dropdown.selectedIndex];
            if (!selectedOption.value) {
                document.getElementById("resultsList").innerHTML = "";
                document.getElementById("saveBar").style.display = "none";
                return;
            }

            currentQueryId = selectedOption.value;
            currentQueryText = selectedOption.getAttribute("data-text");
            approvedDocIds.clear();

            document.getElementById("loadingIndicator").style.display = "block";
            document.getElementById("resultsList").innerHTML = "";
            document.getElementById("saveBar").style.display = "none";

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(currentQueryText)}&top_k=20&algorithm=hybrid`);
                const data = await response.json();
                document.getElementById("loadingIndicator").style.display = "none";

                let html = `<h3 style="color:#f8fafc; margin-bottom:1rem;"><i class="fa-solid fa-file-lines"></i> Danh sách 20 kết quả hàng đầu cho: "${currentQueryText}"</h3>`;
                data.results.forEach((doc, idx) => {
                    html += `
                        <div class="doc-item" id="item-${doc.doc_id}">
                            <div style="flex: 1;">
                                <div style="font-weight: 700; color: #38bdf8; margin-bottom: 0.3rem;">[#${idx+1}] ${doc.raw_title}</div>
                                <div style="font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.5rem;">
                                    Chuyên mục: <strong>${doc.category}</strong> | Độ khó: <strong>${doc.difficulty}</strong> | Điểm Hybrid: <strong>${doc.score}</strong>
                                </div>
                                <div style="font-size: 0.95rem; color: #cbd5e1; line-height: 1.5;">${doc.raw_summary}</div>
                            </div>
                            <div>
                                <button class="toggle-btn" onclick="toggleDoc('${doc.doc_id}')" id="btn-${doc.doc_id}">
                                    <i class="fa-regular fa-square"></i> Chọn (Relevant)
                                </button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById("resultsList").innerHTML = html;
                document.getElementById("saveBar").style.display = "flex";
                updateCount();
            } catch (err) {
                document.getElementById("loadingIndicator").style.display = "none";
                alert("Lỗi tải kết quả: " + err);
            }
        }

        function toggleDoc(docId) {
            const item = document.getElementById(`item-${docId}`);
            const btn = document.getElementById(`btn-${docId}`);
            if (approvedDocIds.has(docId)) {
                approvedDocIds.delete(docId);
                item.classList.remove("selected");
                btn.innerHTML = `<i class="fa-regular fa-square"></i> Chọn (Relevant)`;
            } else {
                approvedDocIds.add(docId);
                item.classList.add("selected");
                btn.innerHTML = `<i class="fa-solid fa-square-check"></i> Đã chọn (1)`;
            }
            updateCount();
        }

        function updateCount() {
            document.getElementById("selectedCountText").innerText = `Đã chọn ${approvedDocIds.size} tài liệu chuẩn phù hợp (Relevant)`;
        }

        async function saveAnnotations() {
            if (!currentQueryId) return;
            const payload = {
                query_id: currentQueryId,
                query: currentQueryText,
                approved_doc_ids: Array.from(approvedDocIds)
            };

            try {
                const res = await fetch("/api/annotate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.status === "success") {
                    alert(`✅ ${result.message} (Tổng số query đã gán nhãn: ${result.total_annotated})`);
                } else {
                    alert("❌ Lỗi: " + result.error);
                }
            } catch (e) {
                alert("❌ Lỗi kết nối server: " + e);
            }
        }
    </script>
</body>
</html>
